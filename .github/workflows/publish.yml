name: Publish to PyPI

# Push a version tag (e.g. v0.1.0) and this builds the sdist+wheel and uploads
# to PyPI via Trusted Publishing (OIDC) — no API token stored anywhere. One-time
# setup: add a "pending publisher" on PyPI for project `claudlet`, owner
# `YeeDochi`, repo `Claudlet`, workflow `publish.yml` (leave environment blank).
on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write            # required for Trusted Publishing (OIDC)
      contents: write            # required to create the GitHub Release
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # fetch full history + annotated tag objects,
          fetch-tags: true        # so the tag's notes message is readable below

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Verify the tag matches the package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VER=$(python -c "import re, pathlib; print(re.search(r'__version__\s*=\s*\"([^\"]+)\"', pathlib.Path('src/claudlet/__init__.py').read_text()).group(1))")
          echo "tag=$TAG  package __version__=$VER"
          test "$TAG" = "$VER" || { echo "::error::tag v$TAG does not match __version__ $VER — bump src/claudlet/__init__.py"; exit 1; }

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      # Notes come from the annotated tag message, which scripts/release.sh fills
      # (hand-written bilingual, or the auto English draft from the commit log).
      # Read the annotation explicitly with for-each-ref and pass it via --notes:
      # gh's --notes-from-tag silently fell back to the *commit* message when the
      # tag object wasn't fully present, so we don't rely on it.
      - name: Create GitHub Release from the tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git fetch --force origin "refs/tags/${GITHUB_REF_NAME}:refs/tags/${GITHUB_REF_NAME}"
          NOTES="$(git for-each-ref "refs/tags/${GITHUB_REF_NAME}" --format='%(contents)')"
          [ -n "$NOTES" ] || NOTES="See the commit history for changes."
          printf '%s\n' "$NOTES" > /tmp/relnotes.md
          gh release create "${GITHUB_REF_NAME}" \
            --title "claudlet ${GITHUB_REF_NAME}" \
            --notes-file /tmp/relnotes.md \
            --verify-tag
